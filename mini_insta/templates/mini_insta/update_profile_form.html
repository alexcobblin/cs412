{% extends 'mini_insta/base.html' %}

{% block content %}
<h1>Update Profile for {{profile.display_name}}</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <table>
    {% for field in form %}
    <tr>
        <th>{{field.label}}</th>
        <td>{{field}}</td>
    </tr>
    {% endfor %}
    <tr>
        <td></td>
        <td>
            <input type="submit" name="update_profile" value="Update Profile">
        </td>
    </tr>
    </table>

    <a href="{% url 'profile' pk=object.pk %}"><button type="button">Cancel</button></a>
</form>

{% endblock %}
