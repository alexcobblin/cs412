{% extends 'mini_insta/base.html' %}

{% block content %}
<h3>Are you sure you want to delete this post?</h3>

<p>
{{post}}
</p>

<form method="POST">
    {% csrf_token %}
    <input type="submit" value="Yes, Delete">
</form>

<form action="{% url 'profile' pk=profile.pk %}" method="GET">
    {% csrf_token %}
    <input type="submit" value="Cancel">
</form>

{% endblock %}
