{% extends 'mini_insta/base.html' %}

{% block content %}
<h1>Create a new Post for {{profile.display_name}}</h1>

<form action="{% url 'create_post' pk=profile.pk %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <table>
    {{form.as_table}}
    <tr>
        <th>Images</th>
        <td><input type="file" name="files" multiple></td>
    </tr>
    </table>

    <input type="submit" name="submit" value="Post">
    <a href="{% url 'profile' pk=profile.pk %}"><button type="button">Cancel</button></a>
</form>

{% endblock %}
