{% extends 'TradingCG/base.html' %}

{% block title %}Delete Listing — TradingCG{% endblock %}

{% block content %}

<h1>Delete Listing</h1>

<div class="card form-card">
    <p>Are you sure you want to delete the listing for <strong>{{ object.card.name }}</strong>? This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'listing' object.pk %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
