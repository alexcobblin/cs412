{% extends 'TradingCG/base.html' %}

{% block title %}Edit Profile — TradingCG{% endblock %}

{% block content %}

<a href="javascript:history.back()" class="btn btn-outline back-btn">← Back</a>

<h1>Edit Profile</h1>

<div class="card form-card">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
                <p class="field-error">{{ error }}</p>
            {% endfor %}
        </div>
        {% endfor %}
        <div class="actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="javascript:history.back()" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
